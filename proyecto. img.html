<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECNOL H - Catálogo de Tecnología</title>
    <style>
        :root {
            --azul-oscuro: #06101e;
            --azul-tarjeta: #0b1a2e;
            --verde-neon: #a6e22e;
            --negro: #030a14;
            --blanco: #ffffff;
            --gris-texto: #8a99ad;
        }

        * {
            box-sizing: border-box;
            transition: all 0.25s ease;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--azul-oscuro);
            color: var(--blanco);
            overflow-x: hidden;
            position: relative;
        }

        /* FONDO REPETIDO CON EL LOGO COMO PATRÓN EN MOSAICO */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('logo Tecnol H.html') repeat;
            background-size: 180px 180px;
            opacity: 0.05;
            z-index: -1;
            pointer-events: none;
        }

        /* NAVEGACIÓN RESPONSIVA */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5%;
            background: rgba(3, 10, 20, 0.95);
            border-bottom: 2px solid var(--verde-neon);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-img {
            height: 40px;
            width: 40px;
            object-fit: contain;
        }

        .logo-texto {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo-texto span {
            color: var(--verde-neon);
        }

        .nav-links button {
            background: none;
            border: 1px solid transparent;
            color: var(--blanco);
            padding: 6px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
        }

        .nav-links button:hover, .nav-links button.active {
            border-color: var(--verde-neon);
            color: var(--verde-neon);
        }

        /* PORTADA (HERO) */
        #portada {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            position: relative;
        }

        .portada-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(166, 226, 46, 0.2));
        }

        .frase-bienvenida {
            font-size: 1rem;
            letter-spacing: 5px;
            color: var(--verde-neon);
            text-transform: uppercase;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        #portada h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(166, 226, 46, 0.2);
        }

        .eslogan {
            font-size: 1.1rem;
            color: var(--gris-texto);
            margin: 15px 0 30px 0;
            max-width: 500px;
            line-height: 1.5;
        }

        .btn-principal {
            padding: 14px 40px;
            font-size: 1rem;
            background: var(--verde-neon);
            color: var(--negro);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(166, 226, 46, 0.3);
        }

        .btn-principal:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(166, 226, 46, 0.5);
        }

        /* SECCIÓN TIENDA */
        #tienda {
            display: none;
            padding: 30px 4%;
        }

        .tienda-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .tienda-header h2 {
            font-size: 2rem;
            margin: 0 0 8px 0;
        }

        /* CATEGORÍAS */
        .categorias-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 5px 5px 15px 5px;
            margin-bottom: 25px;
            scrollbar-width: thin;
            scrollbar-color: var(--verde-neon) var(--azul-oscuro);
            -webkit-overflow-scrolling: touch;
        }

        .categorias-container::-webkit-scrollbar {
            height: 4px;
        }
        
        .categorias-container::-webkit-scrollbar-thumb {
            background: var(--verde-neon);
            border-radius: 2px;
        }

        .btn-cat {
            padding: 8px 18px;
            background: var(--azul-tarjeta);
            color: var(--blanco);
            border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 20px;
            white-space: nowrap;
        }

        .btn-cat:hover, .btn-cat.active {
            background: var(--verde-neon);
            color: var(--negro);
            border-color: var(--verde-neon);
        }

        /* GRID PRODUCTOS */
        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(11, 26, 46, 0.85);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            border-color: var(--verde-neon);
            transform: translateY(-3px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .img-container {
            width: 100%;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(3, 10, 20, 0.4);
            border-radius: 8px;
            margin-bottom: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .card img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .card h3 {
            font-size: 0.95rem;
            margin: 8px 0;
            color: var(--blanco);
            height: 38px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.3;
        }

        .precio {
            color: var(--verde-neon);
            font-size: 1.25rem;
            font-weight: 700;
            margin: 10px 0 0 0;
        }

        /* FOOTER */
        footer {
            padding: 30px 20px;
            text-align: center;
            background: var(--negro);
            color: var(--gris-texto);
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.85rem;
            margin-top: 40px;
        }

        @media (max-width: 480px) {
            body::before { background-size: 120px 120px; }
            #portada h1 { font-size: 2.4rem; }
            .eslogan { font-size: 0.95rem; }
            .grid-productos { 
                grid-template-columns: repeat(2, 1fr);
                gap: 12px; 
            }
            .card { padding: 12px; }
            .img-container { height: 120px; }
            .card h3 { font-size: 0.85rem; height: 34px; }
            .precio { font-size: 1.05rem; }
            .portada-logo { width: 90px; height: 90px; }
        }
    </style>
</head>

        function irTienda() {
            document.getElementById('portada').style.display = 'none';
            document.getElementById('tienda').style.display = 'block';
            
            document.getElementById('btn-nav-inicio').classList.remove('active');
            document.getElementById('btn-nav-tienda').classList.add('active');
            
            window.scrollTo(0,0);
            renderFiltros();
            filtrar(Object.keys(db)[0]); 
        }

        function irInicio() {
            document.getElementById('portada').style.display = 'flex';
            document.getElementById('tienda').style.display = 'none';
            
            document.getElementById('btn-nav-tienda').classList.remove('active');
            document.getElementById('btn-nav-inicio').classList.add('active');
        }

        function renderFiltros() {
            const menu = document.getElementById('menu-filtros');
            menu.innerHTML = '';
            Object.keys(db).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'btn-cat';
                btn.innerText = cat;
                btn.onclick = () => filtrar(cat);
                menu.appendChild(btn);
            });
        }

        function filtrar(categoria) {
            const lista = document.getElementById('lista-productos');
            lista.innerHTML = '';
            
            document.querySelectorAll('.btn-cat').forEach(b => {
                b.classList.remove('active');
                if(b.innerText === categoria) b.classList.add('active');
            });

            db[categoria].forEach(p => {
                // ESTA LÍNEA CARGA AUTOMÁTICAMENTE LA IMAGEN DESDE TU CARPETA "productos/"
                const rutaImagen = `productos.html/${p.n}.png`;

                lista.innerHTML += `
                    <div class="card">
                        <div class="img-container">
                            <img src="${rutaImagen}" alt="${p.n}" onerror="this.onerror=null; this.src='https://via.placeholder.com/240x180/0b1a2e/a6e22e?text=Tecnol+H';">
                        </div>
                        <h3>${p.n}</h3>
                        <p class="precio">${p.p}</p>
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
